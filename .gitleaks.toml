# .gitleaks.toml
# Extends the default gitleaks ruleset with a sensible allowlist for this
# personal-finance repo. Docs: https://github.com/gitleaks/gitleaks

title = "Quanto gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Common non-secrets and test fixtures"
paths = [
  '''(^|/)node_modules/''',
  '''(^|/)tests?/fixtures/''',
  '''(^|/)__fixtures__/''',
  '''\.lock$''',
]
regexes = [
  '''AKIAIOSFODNN7EXAMPLE''',
  '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
  '''00000000-0000-0000-0000-000000000000''',
  '''-----BEGIN PUBLIC KEY-----''',
  '''-----BEGIN CERTIFICATE-----''',
  '''-----BEGIN OPENSSH PUBLIC KEY-----''',
]
