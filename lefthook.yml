# lefthook.yml — Git hooks
#
# Lefthook must be installed globally on PATH.
# Register hooks once per clone with: lefthook install

pre-commit:
  parallel: true
  commands:
    no-secrets:
      run: >
        git diff --cached --diff-filter=ACM -U0 -- . ':!*.md' |
        grep -qiE '(password|secret|token|api[._-]?key|credential|private[._-]?key)\s*[:=]\s*["'"'"']?[^\s"$]' &&
        echo "ERROR: Possible secret detected in staged changes" && exit 1 || exit 0
    branch-check:
      run: |
        branch=$(git symbolic-ref --short HEAD 2>/dev/null)
        if [ "$branch" = "main" ]; then
          echo "ERROR: Direct commits to 'main' are blocked. Create a feature branch first."
          exit 1
        fi
    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}

commit-msg:
  commands:
    conventional-commit:
      run: |
        msg=$(head -1 {1})
        if echo "$msg" | grep -qE '^(Merge|Revert) '; then exit 0; fi
        if ! echo "$msg" | grep -qE '^(feat|fix|docs|chore|refactor|test|ci|style|perf|build|revert)(\(.+\))?!?: .+'; then
          echo "ERROR: Commit message must follow Conventional Commits format."
          echo "  Examples: feat: add login, fix(auth): correct token expiry, docs: update README"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    # Add project-specific pre-push checks here, e.g.:
    #   test-suite:
    #     run: ./tests/run-all.sh
    branch-check:
      run: |
        branch=$(git symbolic-ref --short HEAD 2>/dev/null)
        if [ "$branch" = "main" ]; then
          echo "ERROR: Direct push to 'main' is blocked. Use a pull request."
          exit 1
        fi
